# Builds the wick site: marketing page at the root + MkDocs reference at
# /docs, deployed to GitHub Pages. Go-live for wick.famemu.aulenor.com:
# add DNS CNAME `wick.famemu` -> alikatgh.github.io, then set the custom
# domain in Settings -> Pages (do NOT add a CNAME file before DNS exists).
name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs mkdocs-material
      - name: Build
        run: |
          mkdocs build --strict -d _site/docs
          cp index.html style.css _site/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
